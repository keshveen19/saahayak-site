<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen App — SAAHAYAK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0E12; --panel:#121922; --panel-raised:#1A232D; --hairline:#232E3A;
    --text:#EDF3F6; --muted:#8493A0;
    --red:#FF3B30; --red-dim:#4A1712;
    --amber:#FFB020; --amber-dim:#4A3308;
    --teal:#17D9A3; --teal-dim:#0B3F32;
    --font-display:'Big Shoulders Display',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--void);color:var(--text);font-family:var(--font-body);width:100%;overflow-x:hidden;}
  ::selection{background:var(--red);color:#fff;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:var(--void);}
  ::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:4px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }

  .topnav{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;background:rgba(10,14,18,.88);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--hairline);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;background:linear-gradient(145deg,var(--red),#B8241B);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;
    font-size:18px;color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 6px 16px rgba(255,59,48,.35);
    flex-shrink:0;
  }
  .brand-text{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:.5px;}
  .brand-sub{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .conn-pill{
    display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;
    border:1px solid var(--hairline);background:var(--panel);padding:6px 12px;border-radius:999px;color:var(--muted);
  }
  .conn-pill.online{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-dim);}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  .citizen-wrap{max-width:1180px;margin:0 auto;padding:50px 24px 90px;display:grid;grid-template-columns:1fr 1fr;gap:26px;}
  @media (max-width:880px){.citizen-wrap{grid-template-columns:1fr;}}

  .phone-shell{
    background:var(--panel);border:1px solid var(--hairline);border-radius:26px;padding:30px 26px;
    display:flex;flex-direction:column;align-items:center;gap:22px;position:relative;
  }
  .phone-shell h3{font-family:var(--font-display);font-weight:700;font-size:22px;align-self:flex-start;}

  .field{width:100%;}
  .field label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
  .field input{
    width:100%;margin-top:6px;padding:12px 14px;border-radius:10px;border:1px solid var(--hairline);
    background:var(--panel-raised);color:var(--text);font-size:14px;font-family:var(--font-body);
  }
  .field input:focus{outline:2px solid var(--red);outline-offset:1px;}
  .field input:disabled{opacity:.5;}

  .register-btn{
    width:100%;margin-top:10px;padding:12px 14px;border-radius:10px;
    background:var(--teal);color:#04231b;font-weight:700;font-size:13.5px;
    transition:transform .15s, opacity .2s;
  }
  .register-btn:active{transform:scale(.98);}
  .register-btn:disabled{background:var(--hairline);color:var(--muted);cursor:default;}

  .reg-status{
    width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;
    background:var(--panel-raised);border:1px solid var(--hairline);font-family:var(--font-mono);font-size:11px;color:var(--muted);
  }
  .reg-status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .reg-status.ok{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-dim);}
  .reg-status.ok .dot{background:var(--teal);}

  .loc-status{
    width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;
    background:var(--panel-raised);border:1px solid var(--hairline);font-family:var(--font-mono);font-size:11px;color:var(--muted);
  }
  .loc-status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .loc-status.ok .dot{background:var(--teal);}
  .loc-status.ok{color:var(--teal);}
  .loc-status.bad .dot{background:var(--amber);}
  .loc-status.bad{color:var(--amber);}

  .ping-banner{
    display:none;width:100%;flex-direction:column;gap:10px;
    background:var(--red-dim);border:1px solid var(--red);border-radius:12px;padding:14px 16px;
    animation:pingFlash 1s infinite;
  }
  @keyframes pingFlash{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.5);}50%{box-shadow:0 0 0 8px rgba(255,59,48,0);}}
  .ping-banner .msg{font-size:16px;font-weight:800;}
  .ping-banner .type{font-family:var(--font-mono);font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);font-weight:700;}
  .ping-banner button{
    align-self:flex-start;background:var(--red);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;
  }

  .main-controls{
    width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;
    transition:opacity .3s;
  }
  .main-controls.locked{opacity:.3;filter:blur(1.5px);pointer-events:none;}
  .lock-note{
    font-family:var(--font-mono);font-size:10.5px;color:var(--amber);text-align:center;
  }

  .sos-zone{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;margin:14px 0;}
  .sos-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,59,48,.4);animation:sosPulse 2.4s ease-out infinite;}
  .sos-ring.r2{animation-delay:.8s;}
  .sos-ring.r3{animation-delay:1.6s;}
  @keyframes sosPulse{0%{width:120px;height:120px;opacity:.8;}100%{width:220px;height:220px;opacity:0;}}
  .sos-btn{
    width:130px;height:130px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FF6B5F, var(--red) 55%, #B8241B 100%);
    color:#fff;font-family:var(--font-display);font-weight:900;font-size:26px;letter-spacing:1px;
    box-shadow:0 12px 30px rgba(255,59,48,.4), inset 0 2px 6px rgba(255,255,255,.25);
    z-index:2;transition:transform .15s;
  }
  .sos-btn:active{transform:scale(.94);}
  .sos-btn.sent{background:radial-gradient(circle at 35% 30%,#4CE0BB,var(--teal) 60%,#0B3F32 100%);box-shadow:0 12px 30px rgba(23,217,163,.4);}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;background:var(--panel-raised);border-radius:12px;border:1px solid var(--hairline);cursor:pointer;}
  .toggle-row .label-block .t1{font-size:13px;font-weight:600;}
  .toggle-row .label-block .t2{font-size:11px;color:var(--muted);margin-top:2px;}
  .switch{width:44px;height:24px;border-radius:999px;background:var(--hairline);position:relative;flex-shrink:0;transition:background .25s;}
  .switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--text);transition:transform .25s;}
  .switch.on{background:var(--teal);}
  .switch.on::after{transform:translateX(20px);background:#04231b;}

  .console{
    background:var(--panel);border:1px solid var(--hairline);border-radius:26px;padding:26px;
    display:flex;flex-direction:column;gap:14px;min-height:400px;
  }
  .console h3{font-family:var(--font-display);font-weight:700;font-size:22px;}
  .log-box{
    flex:1;background:#080B0E;border:1px solid var(--hairline);border-radius:12px;padding:16px;
    font-family:var(--font-mono);font-size:11.5px;line-height:1.7;overflow-y:auto;max-height:420px;
  }
  .log-line{margin-bottom:10px;white-space:pre-wrap;word-break:break-word;}
  .log-line .tag{color:var(--teal);}
  .log-line .tag.err{color:var(--amber);}
  .log-line .k{color:var(--muted);}
  .log-empty{color:var(--muted);font-style:italic;}
</style>
</head>
<body>

  <nav class="topnav">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div>
        <div class="brand-text">SAAHAYAK</div>
      </div>
    </div>
    <div class="conn-pill" id="connPill"><span class="conn-dot"></span><span id="connText">Connecting…</span></div>
  </nav>

  <main>
    <div class="citizen-wrap">
      <div class="phone-shell">
        <h3>Citizen SOS Trigger</h3>

        <div class="ping-banner" id="pingBanner">
          <span class="msg" id="pingMsg">🔔 ALERT</span>
          <span class="type" id="pingType">GENERAL</span>
          <button onclick="silenceAlert()">Silence Alert</button>
        </div>

        <div class="field">
          <label for="nameInput">Registered user name</label>
          <input id="nameInput" type="text" placeholder="Enter your full name" required>
          <button class="register-btn" id="registerBtn" onclick="handleRegisterClick()">Register &amp; Unlock</button>
        </div>

        <div class="reg-status" id="regStatus">
          <span class="dot"></span>
          <span id="regText">Not registered yet — enter your name and tap Register</span>
        </div>

        <div class="loc-status" id="locStatus">
          <span class="dot"></span>
          <span id="locText">Requesting location permission…</span>
        </div>

        <div class="main-controls locked" id="mainControls">
          <div class="sos-zone">
            <div class="sos-ring r1"></div><div class="sos-ring r2"></div><div class="sos-ring r3"></div>
            <button class="sos-btn" id="sosBtn" onclick="triggerSOS()">SOS</button>
          </div>

          <div class="toggle-row" onclick="toggleTracking()">
            <div class="label-block">
              <div class="t1">Live location tracking</div>
              <div class="t2" id="trackStatus">Off</div>
            </div>
            <div class="switch" id="trackSwitch"></div>
          </div>
        </div>
        <div class="lock-note" id="lockNote"> Register above to unlock SOS</div>
      </div>

      <div class="console">
        <h3>Request Console</h3>
        <div class="log-box" id="logBox">
          <div class="log-empty">// waiting for registration...</div>
        </div>
      </div>
    </div>
  </main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD3weXtGJtSACqFyEzFpr7BYoYrbtQtkzg",
    authDomain: "saahayak-db.firebaseapp.com",
    databaseURL: "https://saahayak-db-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "saahayak-db",
    storageBucket: "saahayak-db.firebasestorage.app",
    messagingSenderId: "808709229618",
    appId: "1:808709229618:web:375d778ee5577a00dfc02b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let isRegistered = false;

  /* Live danger zones declared by the operator on the dashboard — this
     device checks its own position against ALL of them, not one fixed spot. */
  let zonesCache = {};
  onValue(ref(db, 'zones'), (snap) => { zonesCache = snap.val() || {}; });

  function getDeviceId(){
    let id = sessionStorage.getItem('saahayak-device-id');
    if(!id){
      id = 'DEV-' + Math.random().toString(36).slice(2,8).toUpperCase();
      sessionStorage.setItem('saahayak-device-id', id);
    }
    return id;
  }
  function uid(){ return 'AL-' + Math.random().toString(36).slice(2,8).toUpperCase(); }

  function haversine(lat1,lng1,lat2,lng2){
    const R=6371000, toRad=d=>d*Math.PI/180;
    const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
    const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function logLine(html){
    const box = document.getElementById('logBox');
    if(box.querySelector('.log-empty')) box.innerHTML='';
    const div = document.createElement('div');
    div.className='log-line';
    div.innerHTML = html;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function playAlarm(){
    try{
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [0,0.28,0.56].forEach((t,i)=>{
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type='square'; osc.frequency.value = i%2===0 ? 880 : 660;
        gain.gain.setValueAtTime(0.001, ctx.currentTime+t);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime+t+0.02);
        gain.gain.linearRampToValueAtTime(0.001, ctx.currentTime+t+0.24);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.26);
      });
    }catch(e){}
    if(navigator.vibrate) navigator.vibrate([200,80,200,80,400]);
  }

  function getPosition(){
    return new Promise(resolve=>{
      if(!navigator.geolocation){ resolve({lat:28.6139,lng:77.2090,fallback:true}); return; }
      navigator.geolocation.getCurrentPosition(
        pos=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude,fallback:false}),
        ()=>resolve({lat:28.6139,lng:77.2090,fallback:true}),
        {enableHighAccuracy:true,timeout:12000,maximumAge:0}
      );
    });
  }

  function updateLocStatusUI(pos){
    const el = document.getElementById('locStatus');
    const text = document.getElementById('locText');
    if(pos.fallback){
      el.className = 'loc-status bad';
      text.textContent = 'Location unavailable — check for permission';
    }else{
      el.className = 'loc-status ok';
      text.textContent = `Location locked: ${pos.lat.toFixed(4)}, ${pos.lng.toFixed(4)}`;
    }
  }

  async function handleRegisterClick(){
    const name = document.getElementById('nameInput').value.trim();
    if(!name){
      alert('Please enter your name first.');
      document.getElementById('nameInput').focus();
      return;
    }
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Registering…';

    const pos = await getPosition();
    updateLocStatusUI(pos);

    await set(ref(db, 'citizens/' + getDeviceId()), {
      name,
      lastSeen: new Date().toISOString(),
      lat: pos.lat,
      lng: pos.lng,
      locationAvailable: !pos.fallback
    });

    isRegistered = true;
    document.getElementById('nameInput').disabled = true;
    btn.textContent = '✓ Registered';

    const regEl = document.getElementById('regStatus');
    regEl.className = 'reg-status ok';
    document.getElementById('regText').textContent = `✓ Registered as "${name}"`;

    document.getElementById('mainControls').classList.remove('locked');
    document.getElementById('lockNote').style.display = 'none';

    logLine(`<span class="tag">200 OK</span> <span class="k">registered as "${name}" · device ${getDeviceId()}</span>`);

    if(!tracking) toggleTracking();
  }

  async function heartbeat(){
    if(!isRegistered) return;
    const name = document.getElementById('nameInput').value.trim();
    const pos = await getPosition();
    updateLocStatusUI(pos);
    await set(ref(db, 'citizens/' + getDeviceId()), {
      name,
      lastSeen: new Date().toISOString(),
      lat: pos.lat,
      lng: pos.lng,
      locationAvailable: !pos.fallback
    });
  }

  async function triggerSOS(){
    if(!isRegistered){ alert('Please register first.'); return; }
    const name = document.getElementById('nameInput').value.trim();
    const btn = document.getElementById('sosBtn');
    playAlarm();
    logLine(`<span class="k">POST /api/sos</span>  <span class="tag">→ capturing location...</span>`);
    const pos = await getPosition();
    updateLocStatusUI(pos);
    const alert = { id: uid(), deviceId: getDeviceId(), name, lat: pos.lat, lng: pos.lng, time: new Date().toISOString(), type:'manual', status:'new' };
    await set(ref(db, 'alerts/' + alert.id), alert);

    btn.classList.add('sent');
    setTimeout(()=>btn.classList.remove('sent'), 2200);

    logLine(`<span class="k">payload:</span> {"name":"${name}","lat":${pos.lat.toFixed(4)},"lng":${pos.lng.toFixed(4)},"time":"${alert.time}"}${pos.fallback ? '  <span class="tag err">⚠ LOCATION PERMISSION DENIED OR UNAVAILABLE</span>' : ''}`);
    logLine(`<span class="tag">200 OK</span>  <span class="k">server stored alert ${alert.id}</span>`);
  }

  /* ============ LIVE TRACKING / SELF DANGER-ZONE ALERT ============
     Checks position against EVERY zone the operator has declared on the
     dashboard (loaded live into zonesCache above), not one fixed spot.
     Tracks which zone ids this device has already alerted for, so it
     doesn't spam repeat alerts while sitting inside the same zone. */
  let tracking = false, trackTimer = null, enteredZoneIds = new Set();
  function toggleTracking(){
    if(!isRegistered) return;
    tracking = !tracking;
    document.getElementById('trackSwitch').classList.toggle('on', tracking);
    document.getElementById('trackStatus').textContent = tracking ? 'On' : 'Off';
    if(tracking){
      logLine(`<span class="k">tracking:started</span>`);
      trackTimer = setInterval(checkZone, 6000);
      checkZone();
    } else {
      clearInterval(trackTimer);
      enteredZoneIds.clear();
      logLine(`<span class="k">tracking:stopped</span>`);
    }
  }
  async function checkZone(){
    const pos = await getPosition();
    updateLocStatusUI(pos);
    const name = document.getElementById('nameInput').value.trim() || 'Unregistered User';

    for(const [zoneId, zone] of Object.entries(zonesCache)){
      const dist = haversine(pos.lat, pos.lng, zone.lat, zone.lng);
      const inside = dist <= zone.radius;

      if(inside && !enteredZoneIds.has(zoneId)){
        enteredZoneIds.add(zoneId);
        playAlarm();
        const alert = { id: uid(), deviceId: getDeviceId(), name, lat: pos.lat, lng: pos.lng, time: new Date().toISOString(), type:'zone', status:'new', zoneLabel: zone.label };
        await set(ref(db, 'alerts/' + alert.id), alert);
        logLine(`<span class="tag err">⚠ DANGER ZONE ENTERED: ${zone.label}</span> <span class="k">auto-alert ${alert.id} fired</span>`);
      } else if(!inside && enteredZoneIds.has(zoneId)){
        enteredZoneIds.delete(zoneId);
        logLine(`<span class="k">tracking:</span> exited zone "${zone.label}"`);
      }
    }
  }

  /* ============ BEEP-ON-DEMAND (from dashboard) ============ */
  let beeping = false, beepTimer = null;

  function startBeeping(type){
    beeping = true;
    document.getElementById('pingType').textContent = (type || 'GENERAL').toUpperCase();
    document.getElementById('pingBanner').style.display = 'flex';
    playAlarm();
    clearInterval(beepTimer);
    beepTimer = setInterval(playAlarm, 1500);
    logLine(`<span class="tag err">🔔 ALERT BEEP STARTED</span> <span class="k">emergency type: ${(type||'General')}</span>`);
  }
  function stopBeeping(){
    beeping = false;
    clearInterval(beepTimer);
    document.getElementById('pingBanner').style.display = 'none';
    logLine(`<span class="k">alert beep silenced</span>`);
  }
  async function silenceAlert(){
    await remove(ref(db, 'pings/' + getDeviceId()));
  }

  onValue(ref(db, 'pings/' + getDeviceId()), (snap) => {
    const val = snap.val();
    if(val && val.active){
      if(!beeping) startBeeping(val.type);
    } else if(beeping){
      stopBeeping();
    }
  });

  onValue(ref(db, '.info/connected'), (snap) => {
    const pill = document.getElementById('connPill');
    const text = document.getElementById('connText');
    if(snap.val() === true){ pill.classList.add('online'); text.textContent = 'CONNECTED'; }
    else{ pill.classList.remove('online'); text.textContent = 'CONNECTING…'; }
  });

  (async () => {
    const pos = await getPosition();
    updateLocStatusUI(pos);
  })();
  setInterval(heartbeat, 20000);

  window.handleRegisterClick = handleRegisterClick;
  window.triggerSOS = triggerSOS;
  window.toggleTracking = toggleTracking;
  window.silenceAlert = silenceAlert;
</script>
</body>
</html>
